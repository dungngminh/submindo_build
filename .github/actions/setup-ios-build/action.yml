name: Setup iOS build env
description: >
  Auth asc CLI, import Distribution cert into temp keychain,
  download + install App Store provisioning profile, resolve profile UUID.

inputs:
  xcode-version:
    description: 'Xcode version to select'
    required: false
    default: '16.4'
  java-version:
    description: 'Temurin JDK version for KMP linker'
    required: false
    default: '17'
  install-asc:
    description: 'Install asc CLI (set false if already installed)'
    required: false
    default: 'true'
  install-xcode:
    description: 'Run xcode-select (set false on ubuntu publish job)'
    required: false
    default: 'true'
  asc-key-id:
    description: 'App Store Connect API Key ID'
    required: true
  asc-issuer-id:
    description: 'App Store Connect Issuer ID'
    required: true
  asc-key-p8-base64:
    description: 'base64-encoded AuthKey_*.p8'
    required: true
  distribution-p12-base64:
    description: 'base64-encoded Apple Distribution .p12. Leave empty to skip signing setup (publish-only jobs).'
    required: false
    default: ''
  distribution-p12-password:
    description: 'Password for the .p12'
    required: false
    default: ''
  bundle-id:
    description: 'Bundle ID to match when selecting provisioning profile'
    required: false
    default: ''

outputs:
  provisioning-profile-uuid:
    description: 'UUID of the installed App Store provisioning profile'
    value: ${{ steps.install-profile.outputs.uuid }}

runs:
  using: composite
  steps:

    - name: Select Xcode ${{ inputs.xcode-version }}
      if: ${{ inputs.install-xcode == 'true' }}
      shell: bash
      run: sudo xcode-select -s /Applications/Xcode_${{ inputs.xcode-version }}.app

    - name: Setup JDK ${{ inputs.java-version }}
      if: ${{ inputs.install-xcode == 'true' }}
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      if: ${{ inputs.install-xcode == 'true' }}
      uses: gradle/actions/setup-gradle@v4

    - name: Tune Gradle/Kotlin heap for CI runner
      if: ${{ inputs.install-xcode == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        # The repo's gradle.properties sizes heaps for a dev Mac (Gradle 8g +
        # Kotlin daemon 6g = 14g). GitHub-hosted macos Apple-silicon runners have
        # only ~7 GB RAM, so the Kotlin/Native Release compile OOMs
        # (java.lang.OutOfMemoryError / exit 137 -> ARCHIVE FAILED).
        #
        # GRADLE_USER_HOME/gradle.properties overrides the project gradle.properties,
        # so we shrink the heaps here for CI only (dev machine config untouched).
        # kotlin.native.disableCompilerDaemon=true means K/N compiles inside the
        # Gradle daemon, so org.gradle.jvmargs IS the K/N compiler heap -> give it
        # the bulk and keep the Kotlin JVM daemon small. Serialize Gradle work and
        # rely on runner swap to absorb peak alongside Xcode's clang.
        echo "Runner memory:"
        sysctl -n hw.memsize | awk '{ printf "  hw.memsize = %.1f GB\n", $1/1024/1024/1024 }'
        GRADLE_USER_HOME="${GRADLE_USER_HOME:-$HOME/.gradle}"
        mkdir -p "$GRADLE_USER_HOME"
        printf '%s\n' \
          '' \
          '# --- CI heap override (added by setup-ios-build) ---' \
          'org.gradle.jvmargs=-Xmx5g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8' \
          'kotlin.daemon.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=384m' \
          'org.gradle.parallel=false' \
          'org.gradle.workers.max=1' \
          'kotlin.native.cacheKind=none' \
          >> "$GRADLE_USER_HOME/gradle.properties"
        echo "Wrote CI heap override to $GRADLE_USER_HOME/gradle.properties"

    - name: Install asc CLI
      if: ${{ inputs.install-asc == 'true' }}
      uses: rudrankriyam/setup-asc@v1
      with:
        version: latest

    - name: Auth asc API key
      shell: bash
      env:
        ASC_KEY_ID: ${{ inputs.asc-key-id }}
        ASC_ISSUER_ID: ${{ inputs.asc-issuer-id }}
        ASC_KEY_P8_BASE64: ${{ inputs.asc-key-p8-base64 }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.private_keys"
        chmod 700 "$HOME/.private_keys"
        KEY_PATH="$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8"
        ( umask 077 && echo "$ASC_KEY_P8_BASE64" | base64 -d > "$KEY_PATH" )
        chmod 600 "$KEY_PATH"
        asc auth login --bypass-keychain --name ci \
          --key-id "$ASC_KEY_ID" \
          --issuer-id "$ASC_ISSUER_ID" \
          --private-key "$KEY_PATH"
        asc auth status --validate
        {
          echo "ASC_KEY_PATH=$KEY_PATH"
          echo "ASC_KEY_ID=$ASC_KEY_ID"
          echo "ASC_ISSUER_ID=$ASC_ISSUER_ID"
        } >> "$GITHUB_ENV"

    - name: Import Distribution cert into temp keychain
      if: ${{ inputs.distribution-p12-base64 != '' }}
      shell: bash
      env:
        P12_BASE64: ${{ inputs.distribution-p12-base64 }}
        P12_PASSWORD: ${{ inputs.distribution-p12-password }}
      run: |
        set -euo pipefail
        KEYCHAIN_PASSWORD="ci-$(openssl rand -hex 8)"
        KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
        P12_PATH="$RUNNER_TEMP/distribution.p12"

        ( umask 077 && echo "$P12_BASE64" | base64 -d > "$P12_PATH" )
        chmod 600 "$P12_PATH"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        security import "$P12_PATH" \
          -k "$KEYCHAIN_PATH" \
          -P "$P12_PASSWORD" \
          -A -t cert -f pkcs12

        security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "Installed signing identities:"
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        {
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
        } >> "$GITHUB_ENV"

    - name: Download + install provisioning profile
      id: install-profile
      if: ${{ inputs.distribution-p12-base64 != '' }}
      shell: bash
      env:
        BUNDLE_ID: ${{ inputs.bundle-id }}
      run: |
        set -euo pipefail

        # List IOS_APP_STORE profiles via asc
        PROFILE_IDS=$(asc profiles list \
          --profile-type IOS_APP_STORE \
          --output json \
          | jq -r '.data[].id')

        if [ -z "$PROFILE_IDS" ]; then
          echo "ERROR: No IOS_APP_STORE profiles found on App Store Connect" >&2
          exit 1
        fi

        MATCHED_UUID=""
        while IFS= read -r PROFILE_ID; do
          PROFILE_PATH="$RUNNER_TEMP/${PROFILE_ID}.mobileprovision"

          asc profiles download \
            --id "$PROFILE_ID" \
            --output "$PROFILE_PATH"

          # Inspect to get UUID + bundleId
          INSPECT=$(asc profiles inspect \
            --path "$PROFILE_PATH" \
            --output json)

          PROFILE_UUID=$(echo "$INSPECT" | jq -r '.uuid // empty')
          PROFILE_BUNDLE=$(echo "$INSPECT" | jq -r '.bundleId // empty')

          echo "Profile $PROFILE_ID → uuid=$PROFILE_UUID bundleId=$PROFILE_BUNDLE"

          # Match by bundleId if provided, else first profile wins
          if [ -z "$BUNDLE_ID" ] && [ -z "$MATCHED_UUID" ]; then
            MATCHED_UUID="$PROFILE_UUID"
          elif [ -n "$BUNDLE_ID" ] && [ "$PROFILE_BUNDLE" = "$BUNDLE_ID" ]; then
            MATCHED_UUID="$PROFILE_UUID"
          fi

          # Install regardless — xcodebuild scans the directory
          asc profiles local install --path "$PROFILE_PATH"
          echo "Installed $PROFILE_ID"
        done <<< "$PROFILE_IDS"

        if [ -z "$MATCHED_UUID" ]; then
          echo "ERROR: No profile matched bundle ID '${BUNDLE_ID}'" >&2
          exit 1
        fi

        echo "Resolved PROVISIONING_PROFILE_UUID=$MATCHED_UUID"
        echo "uuid=$MATCHED_UUID" >> "$GITHUB_OUTPUT"
        echo "PROVISIONING_PROFILE_UUID=$MATCHED_UUID" >> "$GITHUB_ENV"
