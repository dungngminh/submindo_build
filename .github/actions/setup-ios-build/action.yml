name: Setup iOS build env
description: Xcode + JDK + Gradle + asc CLI + ASC API key auth + import signing cert.

outputs:
  provisioning-profile-uuid:
    description: 'UUID of the downloaded IOS_APP_STORE profile matching bundle-id'
    value: ${{ steps.resolve-profile.outputs.uuid }}

inputs:
  bundle-id:
    description: 'App bundle identifier to match provisioning profile'
    required: false
    default: ''
  xcode-version:
    description: 'Xcode version to select (e.g. 16.4)'
    required: false
    default: '16.4'
  java-version:
    description: 'Temurin JDK major version for KMP linker'
    required: false
    default: '17'
  install-asc:
    description: 'Install the asc CLI'
    required: false
    default: 'true'
  install-xcode:
    description: 'Run xcode-select for the requested Xcode'
    required: false
    default: 'true'
  asc-key-id:
    description: 'App Store Connect API Key ID'
    required: true
  asc-issuer-id:
    description: 'App Store Connect Issuer ID'
    required: true
  asc-key-p8-base64:
    description: 'base64-encoded AuthKey_*.p8'
    required: true
  distribution-p12-base64:
    description: 'base64-encoded Apple Distribution .p12 (cert + private key)'
    required: false
    default: ''
  distribution-p12-password:
    description: 'Password for the .p12 file'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Select Xcode ${{ inputs.xcode-version }}
      if: ${{ inputs.install-xcode == 'true' }}
      shell: bash
      run: sudo xcode-select -s /Applications/Xcode_${{ inputs.xcode-version }}.app

    - name: Setup JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Install asc CLI
      if: ${{ inputs.install-asc == 'true' }}
      uses: rudrankriyam/setup-asc@v1
      with:
        version: latest

    - name: Write + auth ASC API key
      shell: bash
      env:
        ASC_KEY_ID: ${{ inputs.asc-key-id }}
        ASC_ISSUER_ID: ${{ inputs.asc-issuer-id }}
        ASC_KEY_P8_BASE64: ${{ inputs.asc-key-p8-base64 }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.private_keys"
        chmod 700 "$HOME/.private_keys"
        KEY_PATH="$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8"
        ( umask 077 && echo "$ASC_KEY_P8_BASE64" | base64 -d > "$KEY_PATH" )
        chmod 600 "$KEY_PATH"
        test -s "$KEY_PATH"
        {
          echo "ASC_KEY_PATH=$KEY_PATH"
          echo "ASC_KEY_ID=$ASC_KEY_ID"
          echo "ASC_ISSUER_ID=$ASC_ISSUER_ID"
        } >> "$GITHUB_ENV"
        asc auth login --bypass-keychain --name ci \
          --key-id "$ASC_KEY_ID" \
          --issuer-id "$ASC_ISSUER_ID" \
          --private-key "$KEY_PATH"
        asc auth status --validate

    - name: Import Distribution cert into temp keychain
      if: ${{ inputs.distribution-p12-base64 != '' }}
      shell: bash
      env:
        P12_BASE64: ${{ inputs.distribution-p12-base64 }}
        P12_PASSWORD: ${{ inputs.distribution-p12-password }}
        KEYCHAIN_PASSWORD: ci_keychain_temp_${{ github.run_id }}
      run: |
        set -euo pipefail
        P12_PATH="$RUNNER_TEMP/distribution.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"

        # Decode .p12
        ( umask 077 && echo "$P12_BASE64" | base64 -d > "$P12_PATH" )
        test -s "$P12_PATH"

        # Create temp keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Import cert
        security import "$P12_PATH" \
          -k "$KEYCHAIN_PATH" \
          -P "$P12_PASSWORD" \
          -A \
          -t cert -f pkcs12

        # Add to search list so xcodebuild finds it
        security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

        # Allow xcodebuild to access key without prompt
        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
        echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

        # Verify cert imported
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

    - name: Download + resolve provisioning profile
      id: resolve-profile
      if: ${{ inputs.distribution-p12-base64 != '' }}
      shell: bash
      env:
        BUNDLE_ID: ${{ inputs.bundle-id }}
      run: |
        set -euo pipefail
        PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
        mkdir -p "$PROFILES_DIR"

        RAW=$(asc profiles list --profile-type IOS_APP_STORE --output json)

        # Extract all profile IDs
        PROFILE_IDS=$(echo "$RAW" | jq -r '.data[].id')
        if [ -z "$PROFILE_IDS" ]; then
          echo "ERROR: No IOS_APP_STORE profiles found on ASC" >&2
          exit 1
        fi

        MATCHED_UUID=""
        while IFS= read -r PROFILE_ID; do
          OUTPUT="$PROFILES_DIR/${PROFILE_ID}.mobileprovision"
          echo "Downloading profile $PROFILE_ID"
          asc profiles download --id "$PROFILE_ID" --output "$OUTPUT"

          # Extract UUID + bundle ID from plist inside .mobileprovision
          # .mobileprovision = PKCS7 → strip header/footer, parse embedded plist
          PLIST=$(security cms -D -i "$OUTPUT" 2>/dev/null)
          PROFILE_UUID=$(echo "$PLIST" | plutil -extract UUID raw - 2>/dev/null || true)
          PROFILE_BUNDLE=$(echo "$PLIST" | plutil -extract Entitlements.application-identifier raw - 2>/dev/null \
            | sed 's/^[A-Z0-9]*\.//' || true)

          echo "  UUID=$PROFILE_UUID  BundleID=$PROFILE_BUNDLE"

          # Match by bundle ID if provided, else use first profile
          if [ -z "$BUNDLE_ID" ] && [ -z "$MATCHED_UUID" ]; then
            MATCHED_UUID="$PROFILE_UUID"
          elif [ "$PROFILE_BUNDLE" = "$BUNDLE_ID" ] || [ "$PROFILE_BUNDLE" = "*" ]; then
            MATCHED_UUID="$PROFILE_UUID"
          fi
        done <<< "$PROFILE_IDS"

        if [ -z "$MATCHED_UUID" ]; then
          echo "ERROR: No profile matched bundle ID '$BUNDLE_ID'" >&2
          exit 1
        fi

        echo "uuid=$MATCHED_UUID" >> "$GITHUB_OUTPUT"
        echo "PROVISIONING_PROFILE_UUID=$MATCHED_UUID" >> "$GITHUB_ENV"
        echo "Resolved profile UUID: $MATCHED_UUID"

        echo "Installed profiles:"
        ls "$PROFILES_DIR"/*.mobileprovision
