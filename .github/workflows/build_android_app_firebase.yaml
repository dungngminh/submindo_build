name: Build Android Beta → Firebase App Distribution

run-name: "Android Beta — ${{ github.event.client_payload.ref_name || inputs.ref || 'main' }}"

on:
  repository_dispatch:
    types: [beta]
  workflow_dispatch:
    inputs:
      ref:
        description: "App repo ref to build (branch, tag, or sha)"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.ref || inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  APP_REPO: dungngminh/submindo
  APP_DIR: app

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      version_code: ${{ steps.resolve.outputs.version_code }}
      version_name: ${{ steps.resolve.outputs.version_name }}
    steps:
      - name: Resolve ref + version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.sha }}"
          else
            REF="${{ inputs.ref }}"
          fi
          VERSION_CODE="${{ github.run_number }}"
          VERSION_NAME="0.1.0"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved: ref=$REF code=$VERSION_CODE name=$VERSION_NAME"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Checkout app + write local.properties
        uses: ./.github/actions/checkout-app
        with:
          app-repo: ${{ env.APP_REPO }}
          pat: ${{ secrets.APP_REPO_PAT }}
          ref: ${{ needs.prepare.outputs.ref }}
          app-dir: ${{ env.APP_DIR }}
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          revenuecat-android-key: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          revenuecat-ios-key: ${{ secrets.REVENUECAT_IOS_API_KEY }}

      - name: Setup Android build env
        uses: ./.github/actions/setup-android-build
        with:
          app-dir: ${{ env.APP_DIR }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release APK
        working-directory: ${{ env.APP_DIR }}
        env:
          VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        run: ./gradlew :composeApp:assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-beta-apk
          path: ${{ env.APP_DIR }}/composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7

  distribute:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-beta-apk
          path: artifact

      - name: Locate APK
        id: apk
        run: |
          APK=$(ls artifact/*.apk | head -n1)
          test -s "$APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Decode Firebase service account
        env:
          FIREBASE_SA_JSON_BASE64: ${{ secrets.FIREBASE_SA_JSON_BASE64 }}
        run: |
          echo "$FIREBASE_SA_JSON_BASE64" | base64 -d > firebase-sa.json
          test -s firebase-sa.json

      - name: Write release notes
        run: |
          {
            echo "Submindo beta ${{ needs.prepare.outputs.version_name }}"
            echo "Build #${{ needs.prepare.outputs.version_code }}"
            echo "Source: ${{ needs.prepare.outputs.ref }}"
          } > release-notes.txt

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFile: firebase-sa.json
          groups: ${{ vars.FIREBASE_TESTER_GROUPS || 'testers' }}
          file: ${{ steps.apk.outputs.path }}
          releaseNotesFile: release-notes.txt
