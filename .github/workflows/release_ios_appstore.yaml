name: iOS — App Store release

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: "App repo tag to build (e.g. v1.0.0)"
        required: true
      submit_for_review:
        description: "Auto-submit to App Review"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.ref_name || inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  APP_REPO: dungngminh/submindo
  APP_DIR: app
  XCODE_VERSION: "16.4"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      build_number: ${{ steps.resolve.outputs.build_number }}
      version_name: ${{ steps.resolve.outputs.version_name }}
    steps:
      - name: Resolve ref + version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF_NAME="${{ github.event.client_payload.ref_name }}"
            SHA="${{ github.event.client_payload.sha }}"
          else
            REF_NAME="${{ inputs.ref }}"
            SHA="$REF_NAME"
          fi
          VERSION_NAME="${REF_NAME#v}"
          BUILD_NUMBER="${{ github.run_number }}"
          echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Checkout app + write local.properties
        uses: ./.github/actions/checkout-app
        with:
          app-repo: ${{ env.APP_REPO }}
          pat: ${{ secrets.APP_REPO_PAT }}
          ref: ${{ needs.prepare.outputs.ref }}
          app-dir: ${{ env.APP_DIR }}
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          revenuecat-android-key: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          revenuecat-ios-key: ${{ secrets.REVENUECAT_IOS_API_KEY }}

      - name: Setup iOS build env
        uses: ./.github/actions/setup-ios-build
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          asc-key-id: ${{ secrets.ASC_KEY_ID }}
          asc-issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          asc-key-p8-base64: ${{ secrets.ASC_KEY_P8_BASE64 }}

      - name: Archive + export IPA
        working-directory: ${{ env.APP_DIR }}/iosApp
        env:
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        run: |
          set -euo pipefail
          ARCHIVE="build/Submindo-${VERSION_NAME}-${BUILD_NUMBER}.xcarchive"
          IPA="build/Submindo-${VERSION_NAME}-${BUILD_NUMBER}.ipa"
          mkdir -p build

          asc xcode archive \
            --project iosApp.xcodeproj --scheme iosApp --configuration Release \
            --archive-path "$ARCHIVE" --clean --overwrite \
            --xcodebuild-flag=-destination --xcodebuild-flag=generic/platform=iOS \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --xcodebuild-flag=-authenticationKeyPath --xcodebuild-flag="$ASC_KEY_PATH" \
            --xcodebuild-flag=-authenticationKeyID --xcodebuild-flag="$ASC_KEY_ID" \
            --xcodebuild-flag=-authenticationKeyIssuerID --xcodebuild-flag="$ASC_ISSUER_ID" \
            --xcodebuild-flag="MARKETING_VERSION=$VERSION_NAME" \
            --xcodebuild-flag="CURRENT_PROJECT_VERSION=$BUILD_NUMBER"

          asc xcode export \
            --archive-path "$ARCHIVE" \
            --export-options .asc/export-options-appstore.plist \
            --ipa-path "$IPA" --overwrite --timeout 10m \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --xcodebuild-flag=-authenticationKeyPath --xcodebuild-flag="$ASC_KEY_PATH" \
            --xcodebuild-flag=-authenticationKeyID --xcodebuild-flag="$ASC_KEY_ID" \
            --xcodebuild-flag=-authenticationKeyIssuerID --xcodebuild-flag="$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa-${{ needs.prepare.outputs.tag }}
          path: ${{ env.APP_DIR }}/iosApp/build/*.ipa
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Setup asc CLI + auth (no Xcode/Gradle on ubuntu)
        uses: ./.github/actions/setup-ios-build
        with:
          install-xcode: 'false'
          asc-key-id: ${{ secrets.ASC_KEY_ID }}
          asc-issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          asc-key-p8-base64: ${{ secrets.ASC_KEY_P8_BASE64 }}

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-ipa-${{ needs.prepare.outputs.tag }}
          path: artifact

      - name: Locate IPA
        id: ipa
        run: |
          IPA=$(ls artifact/*.ipa | head -n1)
          test -s "$IPA"
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Publish to App Store
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
          SUBMIT_FOR_REVIEW: ${{ inputs.submit_for_review || 'false' }}
        run: |
          SUBMIT_FLAGS=""
          if [ "$SUBMIT_FOR_REVIEW" = "true" ]; then
            SUBMIT_FLAGS="--submit --confirm"
          fi
          asc publish appstore \
            --app "$ASC_APP_ID" \
            --ipa "${{ steps.ipa.outputs.path }}" \
            --version "$VERSION_NAME" \
            $SUBMIT_FLAGS
