name: iOS — App Store release

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: "App repo tag to build (e.g. v1.0.0)"
        required: true
      submit_for_review:
        description: "Auto-submit to App Review"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

env:
  APP_REPO: dungngminh/submindo
  APP_DIR: app
  XCODE_VERSION: "16.4"

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Resolve ref + version
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.ref_name }}"
            SHA="${{ github.event.client_payload.sha }}"
          else
            REF="${{ inputs.ref }}"
            SHA="$REF"
          fi
          VERSION="${REF#v}"
          echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          token: ${{ secrets.APP_REPO_PAT }}
          ref: ${{ steps.ref.outputs.ref }}
          path: ${{ env.APP_DIR }}

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install asc CLI
        uses: rudrankriyam/setup-asc@v1
        with:
          version: latest

      - name: Write local.properties
        working-directory: ${{ env.APP_DIR }}
        run: |
          cat > local.properties <<'PROPS'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          REVENUECAT_ANDROID_API_KEY=${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          REVENUECAT_IOS_API_KEY=${{ secrets.REVENUECAT_IOS_API_KEY }}
          PROPS

      - name: Build KMP framework
        working-directory: ${{ env.APP_DIR }}
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-daemon --stacktrace

      - name: Write ASC API key + auth
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$HOME/.private_keys"
          KEY_PATH="$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_KEY_P8_BASE64" | base64 -d > "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          asc auth login --bypass-keychain --name ci \
            --key-id "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key "$KEY_PATH"
          asc auth status --validate

      - name: Archive + export + publish App Store
        working-directory: ${{ env.APP_DIR }}/iosApp
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.ref.outputs.version }}
          SUBMIT_FOR_REVIEW: ${{ inputs.submit_for_review || 'false' }}
        run: |
          set -euo pipefail
          ARCHIVE="build/Submindo-${VERSION_NAME}-${BUILD_NUMBER}.xcarchive"
          IPA="build/Submindo-${VERSION_NAME}-${BUILD_NUMBER}.ipa"
          mkdir -p build

          asc xcode archive \
            --project iosApp.xcodeproj --scheme iosApp --configuration Release \
            --archive-path "$ARCHIVE" --clean --overwrite \
            --xcodebuild-flag=-destination --xcodebuild-flag=generic/platform=iOS \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --xcodebuild-flag=-authenticationKeyPath --xcodebuild-flag="$ASC_KEY_PATH" \
            --xcodebuild-flag=-authenticationKeyID --xcodebuild-flag="$ASC_KEY_ID" \
            --xcodebuild-flag=-authenticationKeyIssuerID --xcodebuild-flag="$ASC_ISSUER_ID" \
            --xcodebuild-flag="MARKETING_VERSION=$VERSION_NAME" \
            --xcodebuild-flag="CURRENT_PROJECT_VERSION=$BUILD_NUMBER"

          asc xcode export \
            --archive-path "$ARCHIVE" \
            --export-options .asc/export-options-appstore.plist \
            --ipa-path "$IPA" --overwrite --timeout 10m \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --xcodebuild-flag=-authenticationKeyPath --xcodebuild-flag="$ASC_KEY_PATH" \
            --xcodebuild-flag=-authenticationKeyID --xcodebuild-flag="$ASC_KEY_ID" \
            --xcodebuild-flag=-authenticationKeyIssuerID --xcodebuild-flag="$ASC_ISSUER_ID"

          SUBMIT_FLAGS=""
          if [ "$SUBMIT_FOR_REVIEW" = "true" ]; then
            SUBMIT_FLAGS="--submit --confirm"
          fi

          asc publish appstore \
            --app "$ASC_APP_ID" --ipa "$IPA" \
            --version "$VERSION_NAME" \
            $SUBMIT_FLAGS

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa-${{ steps.ref.outputs.tag }}
          path: ${{ env.APP_DIR }}/iosApp/build/*.ipa
          if-no-files-found: ignore
