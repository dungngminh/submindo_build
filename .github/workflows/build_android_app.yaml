name: Build Submindo Android -> Firebase App Distribution + Play Store internal track

run-name: "Build Android — ${{ github.event.client_payload.ref_name || inputs.ref || 'main' }}"

on:
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      ref:
        description: "App repo ref to build (branch, tag, or sha)"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.ref || inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  APP_REPO: dungngminh/submindo
  APP_DIR: app

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      version_code: ${{ steps.resolve.outputs.version_code }}
      version_name: ${{ steps.app-info.outputs.version-name }}
      commit_message: ${{ steps.app-info.outputs.commit-message }}
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Resolve ref + version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.sha }}"
          else
            REF="${{ inputs.ref }}"
          fi
          VERSION_CODE="${{ github.run_number }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Resolved: ref=$REF code=$VERSION_CODE"

      - name: Extract app info
        id: app-info
        uses: ./.github/actions/extract-app-info
        with:
          app-repo: ${{ env.APP_REPO }}
          ref: ${{ steps.resolve.outputs.ref }}
          token: ${{ secrets.APP_REPO_PAT }}

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Checkout app + write local.properties
        uses: ./.github/actions/checkout-app
        with:
          app-repo: ${{ env.APP_REPO }}
          pat: ${{ secrets.APP_REPO_PAT }}
          ref: ${{ needs.prepare.outputs.ref }}
          app-dir: ${{ env.APP_DIR }}
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          revenuecat-android-key: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          revenuecat-ios-key: ${{ secrets.REVENUECAT_IOS_API_KEY }}

      - name: Setup Android build env
        uses: ./.github/actions/setup-android-build
        with:
          app-dir: ${{ env.APP_DIR }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release AAB
        working-directory: ${{ env.APP_DIR }}
        env:
          VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        run: ./gradlew :composeApp:bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ needs.prepare.outputs.version_code }}
          path: ${{ env.APP_DIR }}/composeApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

  distribute:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ needs.prepare.outputs.version_code }}
          path: artifact

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(ls artifact/*.aab | head -n1)
          test -s "$AAB"
          echo "path=$AAB" >> "$GITHUB_OUTPUT"

      - name: Extract APK from AAB
        id: apk
        run: |
          wget -q https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -O bundletool.jar
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore.jks
          test -s keystore.jks
          java -jar bundletool.jar build-apks \
            --bundle=${{ steps.aab.outputs.path }}
            --output=android-apk-${{ needs.prepare.outputs.version_code }}.apks \
            --mode=universal \
            --ks=keystore.jks \
            --ks-pass=pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --ks-key-alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            --key-pass=pass:${{ secrets.ANDROID_KEY_PASSWORD }}
          mkdir -p app/build/outputs/apk/release/
          unzip -p android-apk-${{ needs.prepare.outputs.version_code }}.apks universal.apk > android-apk-${{ needs.prepare.outputs.version_code }}.apk
          echo "path=android-apk-${{ needs.prepare.outputs.version_code }}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.prepare.outputs.version_code }}
          path: android-apk-${{ needs.prepare.outputs.version_code }}.apk
          if-no-files-found: error
          retention-days: 30

      - name: Decode Play service account
        env:
          PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 -d > play-sa.json
          test -s play-sa.json

      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-sa.json
          packageName: me.komkatstudio.submindo
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: internal
          status: completed

      - name: Decode Firebase service account
        env:
          FIREBASE_SA_JSON_BASE64: ${{ secrets.FIREBASE_SA_JSON_BASE64 }}
        run: |
          echo "$FIREBASE_SA_JSON_BASE64" | base64 -d > firebase-sa.json
          test -s firebase-sa.json

      - name: Write release notes
        run: |
          {
            echo "Submindo beta ${{ needs.prepare.outputs.version_name }}"
            echo "Build #${{ needs.prepare.outputs.version_code }}"
            echo "Source: ${{ needs.prepare.outputs.ref }}"
            echo ""
            echo "Changes: ${{ needs.prepare.outputs.commit_message }}"
          } > release-notes.txt

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFile: firebase-sa.json
          groups: ${{ vars.FIREBASE_TESTER_GROUPS || 'testers' }}
          file: ${{ steps.apk.outputs.path }}
          releaseNotesFile: release-notes.txt
