name: Android — Play Store release

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: "App repo tag to build (e.g. v1.0.0)"
        required: true
      track:
        description: "Play track"
        required: true
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]

permissions:
  contents: write

env:
  APP_REPO: dungngminh/submindo
  APP_DIR: app

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve ref + version
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.ref_name }}"
            SHA="${{ github.event.client_payload.sha }}"
          else
            REF="${{ inputs.ref }}"
            SHA="$REF"
          fi
          VERSION="${REF#v}"
          echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          token: ${{ secrets.APP_REPO_PAT }}
          ref: ${{ steps.ref.outputs.ref }}
          path: ${{ env.APP_DIR }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Decode Play service account
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 -d > play-sa.json

      - name: Write local.properties
        working-directory: ${{ env.APP_DIR }}
        run: |
          cat > local.properties <<'PROPS'
          sdk.dir=${ANDROID_HOME}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          REVENUECAT_ANDROID_API_KEY=${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          REVENUECAT_IOS_API_KEY=${{ secrets.REVENUECAT_IOS_API_KEY }}
          PROPS

      - name: Build AAB + publish to Play
        working-directory: ${{ env.APP_DIR }}
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.ref.outputs.version }}
          KEYSTORE_PATH: ${{ github.workspace }}/${{ env.APP_DIR }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ github.workspace }}/${{ env.APP_DIR }}/play-sa.json
          PLAY_TRACK: ${{ inputs.track || 'internal' }}
        run: |
          ./gradlew :composeApp:bundleRelease \
                    :composeApp:publishReleaseBundle \
                    --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ steps.ref.outputs.tag }}
          path: ${{ env.APP_DIR }}/composeApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Attach AAB to GitHub release
        if: github.event_name == 'repository_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          files: ${{ env.APP_DIR }}/composeApp/build/outputs/bundle/release/*.aab
          fail_on_unmatched_files: false
