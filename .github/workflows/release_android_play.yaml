name: Release Android → Play Store

run-name: "Android Release — ${{ github.event.client_payload.ref_name || inputs.ref }}"

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: "App repo tag to build (e.g. v1.0.0)"
        required: true
      track:
        description: "Play track"
        required: true
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.ref_name || inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  APP_REPO: dungngminh/submindo
  APP_DIR: app

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      version_code: ${{ steps.resolve.outputs.version_code }}
      version_name: ${{ steps.resolve.outputs.version_name }}
    steps:
      - name: Resolve ref + version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF_NAME="${{ github.event.client_payload.ref_name }}"
            SHA="${{ github.event.client_payload.sha }}"
          else
            REF_NAME="${{ inputs.ref }}"
            SHA="$REF_NAME"
          fi
          VERSION_NAME="${REF_NAME#v}"
          VERSION_CODE="${{ github.run_number }}"
          echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Checkout app + write local.properties
        uses: ./.github/actions/checkout-app
        with:
          app-repo: ${{ env.APP_REPO }}
          pat: ${{ secrets.APP_REPO_PAT }}
          ref: ${{ needs.prepare.outputs.ref }}
          app-dir: ${{ env.APP_DIR }}
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          revenuecat-android-key: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          revenuecat-ios-key: ${{ secrets.REVENUECAT_IOS_API_KEY }}

      - name: Setup Android build env
        uses: ./.github/actions/setup-android-build
        with:
          app-dir: ${{ env.APP_DIR }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release AAB
        working-directory: ${{ env.APP_DIR }}
        env:
          VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        run: ./gradlew :composeApp:bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-${{ needs.prepare.outputs.tag }}
          path: ${{ env.APP_DIR }}/composeApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab-${{ needs.prepare.outputs.tag }}
          path: artifact

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(ls artifact/*.aab | head -n1)
          test -s "$AAB"
          echo "path=$AAB" >> "$GITHUB_OUTPUT"

      - name: Decode Play service account
        env:
          PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 -d > play-sa.json
          test -s play-sa.json

      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-sa.json
          packageName: me.komkatstudio.submindo
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: ${{ inputs.track || 'internal' }}
          status: draft

      - name: Attach AAB to GitHub release
        if: github.event_name == 'repository_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: ${{ steps.aab.outputs.path }}
          fail_on_unmatched_files: false
