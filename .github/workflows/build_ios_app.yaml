name: Build Submindo iOS -> TestFlight

run-name: "Build iOS — ${{ github.event.client_payload.ref_name || inputs.ref || 'main' }}"

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      ref:
        description: "App repo ref to build (branch, tag, or sha)"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.ref || inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  APP_REPO: dungngminh/submindo
  APP_DIR: app
  XCODE_VERSION: "26.0.1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      build_number: ${{ steps.resolve.outputs.build_number }}
      version_name: ${{ steps.app-info.outputs.version-name }}
      commit_message: ${{ steps.app-info.outputs.commit-message }}
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Resolve ref + version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.sha }}"
          else
            REF="${{ inputs.ref }}"
          fi
          # build_number = build wall-clock epoch / 60. Always increases on every
          # (re)build of the same commit, so re-dispatch/re-run never collides;
          # not GitHub run_number, so it survives counter resets. ~29.6M now,
          # fits int32 for decades.
          BUILD_NUMBER=$(( $(date +%s) / 60 ))
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Resolved: ref=$REF build_number=$BUILD_NUMBER"

      - name: Extract app info
        id: app-info
        uses: ./.github/actions/extract-app-info
        with:
          app-repo: ${{ env.APP_REPO }}
          ref: ${{ steps.resolve.outputs.ref }}
          token: ${{ secrets.APP_REPO_PAT }}

  build:
    needs: prepare
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Checkout app + write local.properties
        uses: ./.github/actions/checkout-app
        with:
          app-repo: ${{ env.APP_REPO }}
          pat: ${{ secrets.APP_REPO_PAT }}
          ref: ${{ needs.prepare.outputs.ref }}
          app-dir: ${{ env.APP_DIR }}
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          revenuecat-android-key: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          revenuecat-ios-key: ${{ secrets.REVENUECAT_IOS_API_KEY }}

      - name: Setup iOS build env
        uses: ./.github/actions/setup-ios-build
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          asc-key-id: ${{ secrets.ASC_KEY_ID }}
          asc-issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          asc-key-p8-base64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          distribution-p12-base64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          distribution-p12-password: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          bundle-id: me.komkatstudio.submindo

      - name: Write version.properties for CI
        working-directory: ${{ env.APP_DIR }}
        env:
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        run: |
          printf 'VERSION_NAME=%s\nVERSION_CODE=%s\n' "$VERSION_NAME" "$BUILD_NUMBER" > version.properties
          echo "version.properties -> $VERSION_NAME ($BUILD_NUMBER)"

      - name: Archive + export IPA
        working-directory: ${{ env.APP_DIR }}/iosApp
        env:
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        run: |
          set -euo pipefail
          ARCHIVE="build/Submindo-${VERSION_NAME}-${BUILD_NUMBER}.xcarchive"
          IPA="build/Submindo-${VERSION_NAME}-${BUILD_NUMBER}.ipa"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          mkdir -p build

          sed "s/__PROFILE_UUID__/${PROVISIONING_PROFILE_UUID}/g" ".asc/export-options-template.plist" > "$EXPORT_OPTIONS"
          echo "ExportOptions.plist written (profile=${PROVISIONING_PROFILE_UUID})"

          # Archive with automatic signing. Manual signing flags here apply to
          # EVERY target in the graph, including SPM packages (Firebase, etc)
          # which reject provisioning profiles -> ARCHIVE FAILED. Manual signing
          # is applied only to the app target at export via ExportOptions.plist.
          asc xcode archive \
            --project iosApp.xcodeproj --scheme iosApp --configuration Release \
            --clean --archive-path "$ARCHIVE" --overwrite \
            --xcodebuild-flag=-destination \
            --xcodebuild-flag=generic/platform=iOS \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --xcodebuild-flag=-jobs \
            --xcodebuild-flag=2 \
            --xcodebuild-flag="MARKETING_VERSION=${VERSION_NAME}" \
            --xcodebuild-flag="CURRENT_PROJECT_VERSION=${BUILD_NUMBER}" \
            --output json

          asc xcode export \
            --archive-path "$ARCHIVE" \
            --export-options "$EXPORT_OPTIONS" \
            --ipa-path "$IPA" --overwrite --timeout 15m \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --output json

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-beta-ipa
          path: ${{ env.APP_DIR }}/iosApp/build/*.ipa
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout build repo (for composite actions)
        uses: actions/checkout@v4

      - name: Setup asc CLI + auth (no Xcode/Gradle on ubuntu)
        uses: ./.github/actions/setup-ios-build
        with:
          install-xcode: "false"
          asc-key-id: ${{ secrets.ASC_KEY_ID }}
          asc-issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          asc-key-p8-base64: ${{ secrets.ASC_KEY_P8_BASE64 }}

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-beta-ipa
          path: artifact

      - name: Locate IPA
        id: ipa
        run: |
          IPA=$(ls artifact/*.ipa | head -n1)
          test -s "$IPA"
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Write TestFlight release notes
        run: |
          {
            echo "Submindo beta ${{ needs.prepare.outputs.version_name }}"
            echo "Build #${{ needs.prepare.outputs.build_number }}"
            echo "Source: ${{ needs.prepare.outputs.ref }}"
            echo ""
            echo "Changes: ${{ needs.prepare.outputs.commit_message }}"
          } > testflight-notes.txt

      - name: Publish to TestFlight
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          TESTFLIGHT_GROUP: ${{ vars.TESTFLIGHT_GROUP || 'Beta' }}
        run: |
          asc publish testflight \
            --app "$ASC_APP_ID" \
            --ipa "${{ steps.ipa.outputs.path }}" \
            --group "$TESTFLIGHT_GROUP" \
            --test-notes "$(cat testflight-notes.txt)" \
            --locale "en-US" \
            --wait --poll-interval 15s